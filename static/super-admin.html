<!DOCTYPE html>
<html class="dark">
<head>
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

</head>

<body id="body" class="bg-gray-100 dark:bg-gray-900 transition duration-500">

<!-- HEADER -->
<div class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-6 flex justify-between items-center shadow-lg">
  <div>
    <h1 class="text-3xl font-bold">🚀 Admin Dashboard</h1>
    <p class="text-sm opacity-80">Smart Ticket Management</p>
  </div>

  <button onclick="toggleDark()" class="bg-black/30 px-4 py-2 rounded-lg hover:scale-105 transition">
    🌙 Toggle
  </button>
</div>

<div class="p-6">

<!-- STATS -->
<div class="grid grid-cols-3 gap-6 mb-6">

  <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-lg hover:scale-105 transition">
    <p class="text-gray-500 dark:text-gray-300">Total</p>
    <h2 id="total" class="text-3xl font-bold">0</h2>
  </div>

  <div class="bg-yellow-100 dark:bg-yellow-900 p-5 rounded-xl shadow-lg hover:scale-105 transition">
    <p class="text-yellow-700 dark:text-yellow-300">Open</p>
    <h2 id="open" class="text-3xl font-bold">0</h2>
  </div>

  <div class="bg-green-100 dark:bg-green-900 p-5 rounded-xl shadow-lg hover:scale-105 transition">
    <p class="text-green-700 dark:text-green-300">In Progress</p>
    <h2 id="progress" class="text-3xl font-bold">0</h2>
  </div>

</div>

<!-- FILTER -->
<div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow mb-4 flex justify-between">
  <h3 class="font-semibold">Tickets</h3>

  <select onchange="loadTickets(this.value)" class="border p-2 rounded dark:bg-gray-700 dark:text-white">
    <option value="">All</option>
    <option value="open">Open</option>
    <option value="in-progress">In Progress</option>
  </select>
</div>

<!-- TABLE -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-hidden">

<table class="w-full">
<thead class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Title</th>
<th class="p-3">Category</th>
<th class="p-3">Status</th>
<th class="p-3">Student</th>
<th class="p-3">Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-5 right-5 hidden bg-black text-white px-4 py-2 rounded shadow-lg"></div>

<script>
const API = "http://localhost:8080/api";

// Dark Mode Fix
function toggleDark() {
  document.documentElement.classList.toggle("dark");
}

// Toast
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 2000);
}

// Badge
function badge(status) {
  if (status === "open")
    return `<span class="bg-red-200 text-red-700 px-2 py-1 rounded text-sm">Open</span>`;
  if (status === "in-progress")
    return `<span class="bg-yellow-200 text-yellow-800 px-2 py-1 rounded text-sm">In Progress</span>`;
  return `<span class="bg-green-200 text-green-700 px-2 py-1 rounded text-sm">${status}</span>`;
}

// Load
async function loadTickets(status="") {
  let url = API + "/tickets";
  if (status) url += "?status=" + status;

  const res = await fetch(url);
  const data = await res.json();

  table.innerHTML = "";

  let total = data.length;
  let open = 0;
  let progress = 0;

  data.forEach(t => {
    if (t.status === "open") open++;
    if (t.status === "in-progress") progress++;

    table.innerHTML += `
    <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-200">
      <td class="p-3">${t.id}</td>
      <td class="p-3 font-semibold">${t.title}</td>
      <td class="p-3">${t.category}</td>
      <td class="p-3">${badge(t.status)}</td>
      <td class="p-3">${t.student_name || "-"}</td>
      <td class="p-3">
        <button onclick="assign(${t.id})"
          class="bg-indigo-500 text-white px-3 py-1 rounded hover:bg-indigo-600 hover:scale-105 transition">
          Assign
        </button>
      </td>
    </tr>`;
  });

  totalEl.innerText = total;
  openEl.innerText = open;
  progressEl.innerText = progress;
}

async function assign(id) {
  const adminId = prompt("Admin ID:");

  await fetch(API + "/tickets/" + id + "/assign", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({admin_id: parseInt(adminId)})
  });

  showToast("Assigned Successfully 🚀");
  loadTickets();
}

const totalEl = document.getElementById("total");
const openEl = document.getElementById("open");
const progressEl = document.getElementById("progress");

loadTickets();
</script>

</body>
</html>
